var STORE_KEY = 'mbgwatch_mojokerto_v1';

// ── BroadcastChannel real-time sync ──────────────────────────
var bc = null;
try { bc = new BroadcastChannel('mbgwatch_sync'); } catch(e) {}
if (bc) bc.onmessage = function(e) { if (e.data === 'DB_UPDATE') { notifyReact(); setTimeout(patchAll, 150); } };
window.addEventListener('storage', function(e) { if (e.key === STORE_KEY) { notifyReact(); setTimeout(patchAll, 150); } });

function notifyReact() { window.dispatchEvent(new StorageEvent('storage', { key: STORE_KEY })); }

// ── DB helpers ───────────────────────────────────────────────
function readDB() { try { var d = localStorage.getItem(STORE_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; } }
function writeDB(data) {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
    if (bc) bc.postMessage('DB_UPDATE');
  } catch(e) {}
}
function getLap(id) { var db = readDB(); return db ? db.laporan.find(function(l){return l.id===id;})||null : null; }
function saveLap(lap) { var db=readDB(); if(!db) return; var i=db.laporan.findIndex(function(l){return l.id===lap.id;}); if(i>=0)db.laporan[i]=lap; writeDB(db); }
function storeFoto(b64) { var k='foto_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); var db=readDB(); if(!db) return k; if(!db.fotoBlobs) db.fotoBlobs={}; db.fotoBlobs[k]=b64; writeDB(db); return k; }
function getFoto(key) {
  if (!key) return '';
  if (key.indexOf('data:') === 0) return key;
  if (key.indexOf('__demo') === 0) return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="120" height="120" fill="#0a3622" rx="8"/><text x="60" y="72" text-anchor="middle" font-size="40">📷</text></svg>');
  var db=readDB(); return db&&db.fotoBlobs&&db.fotoBlobs[key]?db.fotoBlobs[key]:'';
}
async function toB64(file) { return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result);};r.onerror=rej;r.readAsDataURL(file);}); }

// ── Toast helper ─────────────────────────────────────────────
function toast(msg, type) { var tc=document.querySelector('.toast-container'); if(!tc) return; var t=document.createElement('div'); t.className='toast'; t.innerHTML='<div class="toast-icon">'+(type==='error'?'❌':type==='success'?'✅':'ℹ️')+'</div><div class="toast-body"><strong>'+msg+'</strong></div>'; tc.appendChild(t); setTimeout(function(){t.remove();},3500); }

// ── Modal helper ─────────────────────────────────────────────
function makeModal(id, inner) {
  var ex=document.getElementById(id); if(ex) ex.remove();
  var ov=document.createElement('div');
  ov.id=id; ov.style.cssText='position:fixed;inset:0;background:rgba(10,54,34,.55);backdrop-filter:blur(8px);z-index:500;display:grid;place-items:center;padding:1rem;overflow-y:auto;';
  ov.innerHTML='<div style="background:#fff;border-radius:20px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;padding:1.75rem;position:relative;animation:.25s slideUp;">'+inner+'</div>';
  ov.addEventListener('click', function(e){ if(e.target===ov) ov.remove(); });
  document.body.appendChild(ov);
}

// ── Foto grid builder ────────────────────────────────────────
function fotoGrid(keys, size) {
  if (!keys || !keys.length) return '<p style="font-size:.78rem;color:var(--muted);margin:.3rem 0;">Tidak ada foto</p>';
  var s=size||72;
  var html='<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.35rem;">';
  keys.forEach(function(k){ var src=getFoto(k); if(src) html+='<img src="'+src+'" style="width:'+s+'px;height:'+s+'px;object-fit:cover;border-radius:8px;cursor:pointer;" onclick="window.open(this.src)">'; });
  return html+'</div>';
}

      for (var i=0;i<fi.files.length;i++) { var b=await toB64(fi.files[i]); _newFoto.push(b); var img=document.createElement('img'); img.src=b; img.style.cssText='width:58px;height:58px;object-fit:cover;border-radius:7px;'; prev.appendChild(img); }
    });
    window._verif_newFoto = _newFoto;
    window._verif_id = id;
  }, 50);
};

window._submitVerif = function(id, status) {
  var cat = document.getElementById('pmk-catatan');
  if (!cat||!cat.value.trim()) { toast('Isi catatan verifikasi terlebih dahulu','error'); return; }
  var lap=getLap(id); if(!lap) return;
  lap.status=status; lap.verified_by='Pemkot Mojokerto';
  lap.catatanPemkot=cat.value.trim();
  lap.tglVerifPemkot=new Date().toISOString().split('T')[0];
  var nf=window._verif_newFoto||[];
  lap.fotoVerif=(lap.fotoVerif||[]).concat(nf.map(storeFoto));
  saveLap(lap);
  document.getElementById('verif-modal')&&document.getElementById('verif-modal').remove();
  toast('Verifikasi berhasil disimpan!','success');
  setTimeout(patchAll,200); notifyReact();
};

// ─────────────────────────────────────────────────────────────
// 3. JUSTIFIKASI MODAL (BGN)
// ─────────────────────────────────────────────────────────────
window.showJustifikasiModal = function(id) {
  var lap = getLap(id); if (!lap) return;
  var _newFoto = [];

  var verifBlock = lap.catatanPemkot
    ? '<div style="border:1.5px solid #93c5fd;background:#f0f6ff;border-radius:10px;padding:.75rem .9rem;margin-bottom:.85rem;">'
      +'<div style="font-size:.7rem;font-weight:700;color:#1e40af;margin-bottom:.3rem;display:flex;align-items:center;gap:.4rem;"><img src="'+MJK+'" style="width:16px;height:16px;"> Catatan Verifikasi Pemkot</div>'
      +'<p style="font-size:.8rem;color:#1e3a8a;line-height:1.6;margin:0;">'+lap.catatanPemkot+'</p>'
      +(lap.fotoVerif&&lap.fotoVerif.length?fotoGrid(lap.fotoVerif,56):'')
      +'</div>'
    : '';

  makeModal('justif-modal',
    '<button onclick="document.getElementById(\'justif-modal\').remove()" style="position:absolute;top:.85rem;right:.85rem;background:var(--g-pale);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;">✕</button>'
    +'<div style="display:flex;align-items:center;gap:.65rem;margin-bottom:1rem;">'
    +'<img src="'+BGN+'" style="width:36px;height:36px;object-fit:contain;border-radius:50%;"> '
    +'<div><div style="font-family:Syne,sans-serif;font-weight:800;font-size:1.05rem;color:var(--g-deep);">🔍 Justifikasi BGN/SPPG</div>'
    +'<div style="font-size:.7rem;color:var(--muted);">Badan Gizi Nasional — Kota Mojokerto</div></div></div>'
    +'<div style="background:var(--g-pale);border-radius:10px;padding:.75rem .9rem;margin-bottom:.85rem;">'
    +'<div style="font-weight:700;font-size:.88rem;color:var(--g-deep);">'+lap.sekolah+' — '+lap.jenis+'</div>'
    +'<div style="font-size:.74rem;color:var(--muted);margin-top:.15rem;font-family:monospace;">'+lap.id+' · '+lap.wilayah+' · '+lap.tanggal+'</div>'
    +'<p style="font-size:.8rem;color:var(--ink);margin-top:.45rem;line-height:1.6;">'+lap.deskripsi+'</p>'
    +(lap.fotoLaporan&&lap.fotoLaporan.length?'<div style="font-size:.68rem;font-weight:700;color:var(--muted);margin-top:.5rem;">Foto laporan:</div>'+fotoGrid(lap.fotoLaporan,58):'')
    +'</div>'
    +verifBlock
    +'<div style="margin-bottom:.85rem;">'
    +'<label style="display:block;font-size:.74rem;font-weight:700;color:var(--g-deep);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.35rem;">Justifikasi / Analisis BGN *</label>'
    +'<textarea id="bgn-catatan" placeholder="Contoh: Berdasarkan audit operasional SPPG, ditemukan ... Rekomendasi: ..." style="width:100%;min-height:100px;border:1.5px solid var(--border);border-radius:10px;padding:.65rem .9rem;font-family:DM Sans,sans-serif;font-size:.88rem;outline:none;resize:vertical;box-sizing:border-box;">'+( lap.justifikasiBGN||'')+'</textarea>'
    +'</div>'
    +'<div style="margin-bottom:1rem;">'
    +'<label style="display:block;font-size:.74rem;font-weight:700;color:var(--g-deep);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.35rem;">📷 Foto Justifikasi / Bukti Audit (opsional)</label>'
    +(lap.fotoJustifikasi&&lap.fotoJustifikasi.length?'<div style="font-size:.68rem;color:var(--muted);margin-bottom:.3rem;">Sudah ada:</div>'+fotoGrid(lap.fotoJustifikasi,58):'')
    +'<input type="file" id="bgn-foto" accept="image/*" multiple style="display:none;">'
    +'<button onclick="document.getElementById(\'bgn-foto\').click()" style="background:#f0fdf4;border:1.5px dashed #86efac;border-radius:10px;padding:.6rem 1rem;cursor:pointer;font-size:.82rem;color:var(--g-mid);width:100%;margin-top:.4rem;">＋ Tambah Foto Audit</button>'
    +'<div id="bgn-preview" style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem;"></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:.65rem;">'
    +'<button onclick="window._submitJustifikasi(\''+id+'\',true)" style="background:var(--g-mid);color:#fff;border:none;border-radius:100px;padding:.65rem;font-size:.84rem;font-weight:700;cursor:pointer;">✅ Simpan & Selesaikan</button>'
    +'<button onclick="window._submitJustifikasi(\''+id+'\',false)" style="background:#e0f2fe;color:#0369a1;border:none;border-radius:100px;padding:.65rem;font-size:.84rem;font-weight:700;cursor:pointer;">💾 Simpan Draft</button>'
    +'</div>'
  );

  setTimeout(function() {
    var fi=document.getElementById('bgn-foto'), prev=document.getElementById('bgn-preview');
    if(fi) fi.addEventListener('change', async function(){
      for(var i=0;i<fi.files.length;i++){var b=await toB64(fi.files[i]);_newFoto.push(b);var img=document.createElement('img');img.src=b;img.style.cssText='width:58px;height:58px;object-fit:cover;border-radius:7px;';prev.appendChild(img);}
    });
    window._bgn_newFoto=_newFoto; window._bgn_id=id;
  }, 50);
};

window._submitJustifikasi = function(id, finish) {
  var cat=document.getElementById('bgn-catatan');
  if(!cat||!cat.value.trim()){toast('Isi justifikasi terlebih dahulu','error');return;}
  var lap=getLap(id); if(!lap) return;
  lap.justifikasiBGN=cat.value.trim();
  lap.tglJustifikasiBGN=new Date().toISOString().split('T')[0];
  if(finish){lap.status='done'; lap.verified_by=lap.verified_by||'BGN Mojokerto';}
  var nf=window._bgn_newFoto||[];
  lap.fotoJustifikasi=(lap.fotoJustifikasi||[]).concat(nf.map(storeFoto));
  saveLap(lap);
  document.getElementById('justif-modal')&&document.getElementById('justif-modal').remove();
  toast(finish?'Justifikasi tersimpan & laporan diselesaikan!':'Draft justifikasi tersimpan','success');
  setTimeout(patchAll,200); notifyReact();
};

// ─────────────────────────────────────────────────────────────
// DOM PATCHERS
// ─────────────────────────────────────────────────────────────
function patchRiwayatTable() {
  // Find masyarakat riwayat table (has columns: ID, Tgl/Waktu, Kecamatan, Sekolah, Jenis, Status)
  document.querySelectorAll('.table-responsive table').forEach(function(table) {
    var hr = table.querySelector('thead tr');
    if (!hr || hr.dataset.riwayatPatched) return;
    var ths = hr.querySelectorAll('th');
    if (ths.length < 5) return;
    var texts = Array.from(ths).map(function(t){return t.textContent.trim();});
    var hasAksi = texts.indexOf('Aksi') >= 0;
    // Riwayat table: no Aksi col initially, has Status as last col
    if (hasAksi) return;
    if (texts.indexOf('Status') < 0) return;
    hr.dataset.riwayatPatched = '1';
    var th = document.createElement('th'); th.textContent = 'Aksi'; hr.appendChild(th);

    table.querySelectorAll('tbody tr').forEach(function(row) {
      if (row.dataset.riwayatPatched) return;
      row.dataset.riwayatPatched = '1';
      var idBadge = row.querySelector('.id-badge');
      var lid = idBadge ? idBadge.textContent.trim() : '';
      var lap = lid ? getLap(lid) : null;
      var fotoN = lap&&lap.fotoLaporan ? lap.fotoLaporan.length : 0;
      var hasResp = lap && (lap.catatanPemkot || lap.justifikasiBGN);
      var td = document.createElement('td');
      td.innerHTML = '<button onclick="showMBGDetail(\''+lid+'\')" style="background:var(--g-pale);color:var(--g-deep);border:1px solid var(--border);border-radius:100px;padding:.22rem .65rem;font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;">'
        +'🔍 Detail'+(fotoN>0?' 📷'+fotoN:'')+(hasResp?' ✅':'')+'</button>';
      row.appendChild(td);
    });
  });
}

function patchVerifCards() {
  document.querySelectorAll('.verif-card').forEach(function(card) {
    if (card.dataset.pmkPatched) return;
    var actions = card.querySelector('.verif-actions');
    if (!actions) return;
    var badge = card.querySelector('.id-badge');
    var lid = badge ? badge.textContent.trim() : ''; if (!lid) return;
    card.dataset.pmkPatched = '1';
    actions.innerHTML = ''
      +'<button onclick="showVerifModal(\''+lid+'\')" style="background:var(--g-deep);color:var(--g-light);border:none;border-radius:100px;padding:.52rem 1.1rem;font-size:.82rem;font-weight:700;cursor:pointer;">✅ Form Verifikasi Lapangan</button>'
      +'<button onclick="showMBGDetail(\''+lid+'\')" style="background:var(--g-pale);color:var(--g-deep);border:1.5px solid var(--border);border-radius:100px;padding:.5rem 1rem;font-size:.82rem;font-weight:700;cursor:pointer;">🔍 Detail</button>';
  });
}

function patchBGNTable() {
  var sr = document.querySelector('.su-role');
  if (!sr || sr.textContent.indexOf('BGN') < 0) return;
  document.querySelectorAll('.table-responsive table').forEach(function(table) {
    var hr = table.querySelector('thead tr');
    if (!hr || hr.dataset.bgnPatched) return;
    var ths = hr.querySelectorAll('th');
    var texts = Array.from(ths).map(function(t){return t.textContent.trim();});
    if (texts.indexOf('Aksi') < 0) return;
    hr.dataset.bgnPatched = '1';
    ths.forEach(function(th){ if(th.textContent.trim()==='Aksi') th.innerHTML='Aksi / Justifikasi'; });
    table.querySelectorAll('tbody tr').forEach(function(row) {
      if (row.dataset.bgnPatched) return;
      row.dataset.bgnPatched = '1';
      var badge = row.querySelector('.id-badge');
      var lid = badge ? badge.textContent.trim() : ''; if (!lid) return;
      var lap = getLap(lid);
      var hasJ = lap && (lap.justifikasiBGN || (lap.fotoJustifikasi && lap.fotoJustifikasi.length));
      var lastTd = row.cells[row.cells.length-1];
      if (lastTd) lastTd.innerHTML = '<div style="display:flex;gap:.3rem;flex-wrap:wrap;">'
        +'<button onclick="showJustifikasiModal(\''+lid+'\')" style="background:'+(hasJ?'#dcfce7':'#fef3c7')+';color:'+(hasJ?'#166534':'#92400e')+';border:1px solid '+(hasJ?'#86efac':'#fcd34d')+';border-radius:100px;padding:.22rem .65rem;font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;">'+(hasJ?'✅ Edit Justifikasi':'🔍 Justifikasi')+'</button>'
        +'<button onclick="showMBGDetail(\''+lid+'\')" style="background:var(--g-pale);color:var(--g-deep);border:1px solid var(--border);border-radius:100px;padding:.22rem .55rem;font-size:.7rem;font-weight:700;cursor:pointer;">👁</button>'
        +'</div>';
    });
  });
}

function patchLogos() {
  document.querySelectorAll('.portal-card').forEach(function(card) {
    var h3=card.querySelector('h3'), icon=card.querySelector('.portal-icon');
    if (!h3||!icon||icon.dataset.replaced) return;
    var t=h3.textContent||'';
    if (t.indexOf('Pemerintah Kota')>=0){icon.dataset.replaced='1';icon.innerHTML='<img src="'+MJK+'" style="width:80px;height:80px;object-fit:contain;display:block;margin:0 auto;">';}
    if (t.indexOf('BGN')>=0){icon.dataset.replaced='1';icon.innerHTML='<img src="'+BGN+'" style="width:80px;height:80px;object-fit:contain;display:block;margin:0 auto;border-radius:50%;">';}
  });
  document.querySelectorAll('.modal').forEach(function(m) {
    if (m.dataset.patched) return;
    var h2=m.querySelector('h2'); if(!h2) return;
    var t=h2.textContent||'', src='', rl='', rd='', st='';
    if(t.indexOf('Pemerintah Kota')>=0){src=MJK;rl='PEMERINTAH KOTA MOJOKERTO';rd='Verifikator Laporan MBG';}
    else if(t.indexOf('BGN')>=0){src=BGN;rl='BADAN GIZI NASIONAL';rd='Republik Indonesia';st='border-radius:50%;';}
    if(!src) return;
    m.dataset.patched='1';
    var w=document.createElement('div');
    w.style.cssText='display:flex;align-items:center;gap:.75rem;margin-bottom:.85rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);';
    w.innerHTML='<img src="'+src+'" style="width:50px;height:50px;object-fit:contain;flex-shrink:0;'+st+'"><div><div style="font-size:.63rem;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.1rem;">'+rl+'</div><div style="font-size:.77rem;color:var(--muted);">'+rd+'</div></div>';
    h2.parentNode.insertBefore(w,h2);
  });
}

function patchSidebar() {
  var sl=document.querySelector('.sidebar-logo'); if(!sl||sl.dataset.patched) return;
  var sr=document.querySelector('.su-role'); if(!sr) return;
  var rt=sr.textContent||'';
  var src=rt.indexOf('Pemerintah')>=0?MJK:rt.indexOf('BGN')>=0?BGN:null; if(!src) return;
  sl.dataset.patched='1';
  var img=document.createElement('img');
  img.src=src; img.style.cssText='width:28px;height:28px;object-fit:contain;margin-left:auto;background:#fff;padding:2px;flex-shrink:0;'+(rt.indexOf('BGN')>=0?'border-radius:50%;':'border-radius:4px;');
  sl.appendChild(img);
}

function patchBanners() {
  document.querySelectorAll('.welcome-banner').forEach(function(b) {
    if(b.dataset.patched) return;
    var h2=b.querySelector('h2'); if(!h2) return;
    var t=h2.textContent||'', src='', st='', rl='', rd='';
    if(t.indexOf('Pemkot')>=0||t.indexOf('Dashboard')>=0){src=MJK;st='border-radius:8px;background:rgba(255,255,255,.15);padding:3px;';rl='PEMERINTAH KOTA MOJOKERTO';rd='Dinas Pengawasan MBG';}
    else if(t.indexOf('BGN')>=0||t.indexOf('Control Center')>=0){src=BGN;st='border-radius:50%;background:rgba(255,255,255,.12);';rl='BADAN GIZI NASIONAL';rd='Republik Indonesia — Kota Mojokerto';}
    if(!src) return;
    b.dataset.patched='1';
    var w=document.createElement('div');
    w.style.cssText='display:flex;align-items:center;gap:.85rem;margin-bottom:.85rem;';
    w.innerHTML='<img src="'+src+'" style="width:48px;height:48px;object-fit:contain;flex-shrink:0;'+st+'"><div><div style="font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:.1rem;">'+rl+'</div><div style="font-size:.77rem;color:rgba(255,255,255,.75);">'+rd+'</div></div>';
    b.insertBefore(w,b.firstChild);
  });
}

function patchAll() {
  patchRiwayatTable();
  patchVerifCards();
  patchBGNTable();
  patchLogos();
  patchSidebar();
  patchBanners();
}

var obs=new MutationObserver(patchAll);
obs.observe(document.body,{childList:true,subtree:true});
[200,600,1200,2500].forEach(function(t){setTimeout(patchAll,t);});
})();
</script>
